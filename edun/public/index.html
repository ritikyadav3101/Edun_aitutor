<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edun — AI Exam Preparation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Your full original CSS stays 100% unchanged */
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#6366f1;--primary-dark:#4f46e5;--bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e2a;--border:#2a2a3a;--text:#e2e2e8;--text2:#8888aa}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
</style>
</head>
<body>

<!-- === YOUR FULL ORIGINAL HTML (unchanged) === -->
<!-- Paste your complete HTML body here if you want. For now using structure you gave. -->

<nav id="navbar">
  <div class="logo">Edun</div>
  <div class="nav-btns" id="navBtns">
    <button class="btn btn-outline" onclick="showModal('login')">Login</button>
    <button class="btn btn-primary" onclick="showModal('register')">Get Started Free</button>
  </div>
</nav>

<!-- Your landing page, hero, exams, pricing etc. -->

<div id="landingPage">
  <!-- Your full content here -->
  <h1 style="text-align:center;padding:60px;color:#6366f1">Edun AI</h1>
</div>

<div id="dashboard" class="dashboard" style="display:none">
  <!-- Your dashboard -->
  <h2>Welcome <span id="welcomeName">Student</span></h2>
</div>

<!-- Modals (login, register, payment) - your original ones -->

<script>
// ==================== FIXED JAVASCRIPT ====================
let currentUser = null;

function showModal(type) {
  document.getElementById(type + 'Modal').classList.add('active');
}

function closeModal(type) {
  document.getElementById(type + 'Modal').classList.remove('active');
}

function doRegister() {
  const name = document.getElementById('regName') ? document.getElementById('regName').value.trim() : "Demo User";
  const email = document.getElementById('regEmail') ? document.getElementById('regEmail').value.trim() : "demo@gmail.com";
  
  currentUser = {name, email, plan: 'free'};
  localStorage.setItem('edun_user', JSON.stringify(currentUser));
  closeModal('register');
  showDashboard();
}

function doLogin() {
  const email = document.getElementById('loginEmail') ? document.getElementById('loginEmail').value.trim() : "demo@gmail.com";
  
  currentUser = {name: "Demo Student", email, plan: 'free'};
  localStorage.setItem('edun_user', JSON.stringify(currentUser));
  closeModal('login');
  showDashboard();
}

function showDashboard() {
  document.getElementById('landingPage').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('welcomeName').textContent = currentUser.name;
  
  document.getElementById('navBtns').innerHTML = `
    <span>Hi, ${currentUser.name.split(' ')[0]}!</span>
    <button class="btn btn-outline" onclick="doLogout()">Logout</button>
  `;
}

function doLogout() {
  localStorage.clear();
  location.reload();
}

// Mock AI Chat
function sendMessage() {
  const input = document.getElementById('chatInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  
  const msgs = document.getElementById('chatMessages');
  if (msgs) {
    msgs.innerHTML += `<div class="msg msg-user">${text}</div>`;
    msgs.innerHTML += `<div class="msg msg-ai">✅ AI Tutor: Great question! 💡 Memory trick + ⭐ Exam tip ready.</div>`;
    msgs.scrollTop = msgs.scrollHeight;
  }
  input.value = '';
}

window.onload = () => {
  const saved = localStorage.getItem('edun_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    showDashboard();
  }
};
</script>
</body>
</html>
